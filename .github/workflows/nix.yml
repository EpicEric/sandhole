on:
  push:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: "nix"
  cancel-in-progress: true

jobs:
  build-nix-packages:
    name: Build and push Nix packages (${{ matrix.system }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            system: x86_64-linux
          - runner: ubuntu-24.04-arm
            system: aarch64-linux
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: true
      - name: Install Nix
        uses: cachix/install-nix-action@4e002c8ec80594ecd40e759629461e26c8abed15 # v31.9.0
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            system = ${{ matrix.system }}
            extra-substituters = ${{ vars.NIKS3_SERVER_URL }}
            extra-trusted-public-keys = ${{ vars.NIKS3_PUBLIC_KEY }}
      - id: build
        name: Build packages
        run: |
          echo "sandhole=$(nix build .#sandhole --no-link --print-out-paths)" >> $GITHUB_OUTPUT
          echo "udp_over_tcp=$(nix build .#udp_over_tcp --no-link --print-out-paths)" >> $GITHUB_OUTPUT
      - name: Install niks3
        run: |
          nix-env -iA niks3 -f '<nixpkgs>'
      - name: Push to niks3
        env:
          NIKS3_AUTH_TOKEN_FILE: "/tmp/niks3-token"
          NIKS3_SERVER_URL: ${{ vars.NIKS3_SERVER_URL }}
          SANDHOLE_PATH: ${{ steps.build.outputs.sandhole }}
          UDP_OVER_TCP_PATH: ${{ steps.build.outputs.udp_over_tcp }}
        run: |
          echo ${{ secrets.NIKS3_AUTH_TOKEN }} > /tmp/niks3-token
          niks3 push ${SANDHOLE_PATH} ${UDP_OVER_TCP_PATH}
      - name: Install cachix
        run: |
          nix-env -iA cachix -f '<nixpkgs>'
      - name: Push to Cachix
        env:
          CACHIX_NAME: ${{ vars.CACHIX_NAME }}
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
          SANDHOLE_PATH: ${{ steps.build.outputs.sandhole }}
          UDP_OVER_TCP_PATH: ${{ steps.build.outputs.udp_over_tcp }}
        run: |
          cachix push ${CACHIX_NAME} ${SANDHOLE_PATH} ${UDP_OVER_TCP_PATH}
